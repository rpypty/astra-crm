services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astra_crm}
      POSTGRES_USER: ${POSTGRES_USER:-astra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astra}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astra} -d ${POSTGRES_DB:-astra_crm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./astra-crm-backend
    command: ["/app/migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://astra:astra@postgres:5432/astra_crm?sslmode=disable}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: ./astra-crm-backend
    command: ["/app/seed"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://astra:astra@postgres:5432/astra_crm?sslmode=disable}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build:
      context: ./astra-crm-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://astra:astra@postgres:5432/astra_crm?sslmode=disable}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-p2p_crm_session}
      SESSION_SECURE: ${SESSION_SECURE:-false}
    ports:
      - "8080:8080"
    depends_on:
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./astra-crm-frontend
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8080}
      VITE_DEMO_ACCOUNTING_PERIOD_ID: ${VITE_DEMO_ACCOUNTING_PERIOD_ID:-1}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
