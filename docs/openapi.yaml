openapi: 3.1.0
info:
  title: p2p-crm API
  version: 0.1.0
servers:
  - url: /api/v1
security:
  - sessionCookie: []
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: p2p_crm_session
      description: Server-side session token. Cookie is httpOnly, SameSite=Lax, Secure outside local development.
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, DOMAIN_ERROR]
            message:
              type: string
            fields:
              type: object
              additionalProperties:
                type: string
            details:
              type: array
              items:
                type: string
    User:
      type: object
      required: [id, teamId, role, login, status]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        role: { type: string, enum: [teamlead, trader] }
        login: { type: string }
        status: { type: string, enum: [active, disabled, deleted] }
    Trader:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required: [salaryRateBps, externalWorkerName, createdAt, updatedAt]
          properties:
            salaryRateBps: { type: integer, format: int64 }
            externalWorkerName: { type: string }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    AuthResponse:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/User" }
    TradersListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Trader" }
    TraderResponse:
      type: object
      required: [trader]
      properties:
        trader: { $ref: "#/components/schemas/Trader" }
    ResetTraderPasswordResponse:
      type: object
      required: [trader, temporaryPassword]
      properties:
        trader: { $ref: "#/components/schemas/Trader" }
        temporaryPassword:
          type: string
          description: Temporary password returned only once. It must not be logged or stored by clients.
    Requisite:
      type: object
      required: [id, teamId, phone, methodType, status, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        phone: { type: string }
        methodType: { type: string }
        proxy: { type: string }
        status: { type: string, enum: [active, disabled, archived] }
        assignedTraderId: { type: integer, format: int64 }
        assignedTraderLogin: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RequisiteAssignment:
      type: object
      required: [id, teamId, requisiteId, traderId, assignedBy, assignedAt, wasReassign]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        requisiteId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        assignedBy: { type: integer, format: int64 }
        assignedAt: { type: string, format: date-time }
        unassignedAt: { type: string, format: date-time }
        comment: { type: string }
        wasReassign: { type: boolean }
    RequisitesListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Requisite" }
    RequisiteResponse:
      type: object
      required: [requisite]
      properties:
        requisite: { $ref: "#/components/schemas/Requisite" }
    AssignmentResponse:
      type: object
      required: [assignment]
      properties:
        assignment: { $ref: "#/components/schemas/RequisiteAssignment" }
    AssignmentHistoryResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RequisiteAssignment" }
    Shift:
      type: object
      required: [id, teamId, traderId, startedAt, status, inboundReconciliationStatus, outboundReconciliationStatus, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time }
        status: { type: string, enum: [open, closing, closed, closed_with_discrepancy] }
        inboundReconciliationStatus: { type: string }
        outboundReconciliationStatus: { type: string }
        closeComment: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time }
    CurrentShiftResponse:
      type: object
      properties:
        shift: { $ref: "#/components/schemas/Shift" }
    CloseShiftResponse:
      type: object
      required: [shift]
      properties:
        shift: { $ref: "#/components/schemas/Shift" }
    AssignedRequisite:
      type: object
      required: [id, teamId, phone, methodType, status, assignmentId, inWork]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        phone: { type: string }
        methodType: { type: string }
        proxy: { type: string }
        status: { type: string, enum: [active, disabled, archived] }
        assignmentId: { type: integer, format: int64 }
        shiftRequisiteId: { type: integer, format: int64 }
        cardNumber: { type: string }
        holderName: { type: string }
        shiftRequisiteStatus: { type: string, enum: [active, released] }
        takenAt: { type: string, format: date-time }
        inWork: { type: boolean }
    AssignedRequisitesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AssignedRequisite" }
    ShiftRequisite:
      type: object
      required: [id, teamId, shiftId, traderId, requisiteId, cardNumber, holderName, takenAt, status, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        shiftId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        requisiteId: { type: integer, format: int64 }
        assignmentId: { type: integer, format: int64 }
        cardNumber: { type: string }
        holderName: { type: string }
        takenAt: { type: string, format: date-time }
        releasedAt: { type: string, format: date-time }
        status: { type: string, enum: [active, released] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ShiftRequisitesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ShiftRequisite" }
    TakeRequisiteResponse:
      type: object
      required: [shift, shiftRequisite, shiftCreated]
      properties:
        shift: { $ref: "#/components/schemas/Shift" }
        shiftRequisite: { $ref: "#/components/schemas/ShiftRequisite" }
        shiftCreated: { type: boolean }
    ShiftRequisiteResponse:
      type: object
      required: [shiftRequisite]
      properties:
        shiftRequisite: { $ref: "#/components/schemas/ShiftRequisite" }
    TurnoverEntry:
      type: object
      required: [id, teamId, shiftId, shiftRequisiteId, requisiteId, traderId, amountMinor, createdBy, createdAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        shiftId: { type: integer, format: int64 }
        shiftRequisiteId: { type: integer, format: int64 }
        requisiteId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        amountMinor: { type: integer, format: int64 }
        createdBy: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        comment: { type: string }
    TurnoversResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TurnoverEntry" }
    TurnoverResponse:
      type: object
      required: [turnover]
      properties:
        turnover: { $ref: "#/components/schemas/TurnoverEntry" }
    CloseChecklist:
      type: object
      required: [shift, inboundImported, inboundOk, outboundImported, outboundOk, allPayoutsFullyPaid, unpaidPayoutCount, canClose]
      properties:
        shift: { $ref: "#/components/schemas/Shift" }
        inboundImported: { type: boolean }
        inboundOk: { type: boolean }
        outboundImported: { type: boolean }
        outboundOk: { type: boolean }
        allPayoutsFullyPaid: { type: boolean }
        unpaidPayoutCount: { type: integer, format: int64 }
        canClose: { type: boolean }
    ChecklistResponse:
      type: object
      required: [checklist]
      properties:
        checklist: { $ref: "#/components/schemas/CloseChecklist" }
    Payout:
      type: object
      required: [id, teamId, shiftId, traderId, destinationBank, destinationRequisite, amountMinor, paidAmountMinor, remainingAmountMinor, status, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        shiftId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        destinationBank: { type: string }
        destinationRequisite: { type: string }
        amountMinor: { type: integer, format: int64 }
        paidAmountMinor: { type: integer, format: int64 }
        remainingAmountMinor: { type: integer, format: int64 }
        status: { type: string, enum: [draft, in_progress, paid, cancelled] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time }
    PayoutTransfer:
      type: object
      required: [id, teamId, manualPayoutOrderId, shiftId, traderId, sourceShiftRequisiteId, sourceRequisiteId, amountMinor, createdBy, createdAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        manualPayoutOrderId: { type: integer, format: int64 }
        shiftId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        sourceShiftRequisiteId: { type: integer, format: int64 }
        sourceRequisiteId: { type: integer, format: int64 }
        amountMinor: { type: integer, format: int64 }
        createdBy: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        comment: { type: string }
    PayoutsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Payout" }
    PayoutResponse:
      type: object
      required: [payout]
      properties:
        payout: { $ref: "#/components/schemas/Payout" }
    PayoutDetailsResponse:
      type: object
      required: [payout, transfers]
      properties:
        payout: { $ref: "#/components/schemas/Payout" }
        transfers:
          type: array
          items: { $ref: "#/components/schemas/PayoutTransfer" }
    TransferResponse:
      type: object
      required: [transfer]
      properties:
        transfer: { $ref: "#/components/schemas/PayoutTransfer" }
    Order:
      type: object
      required: [id, externalOrderId, externalId, externalInnerId, workerName, amountMinor, currency, rawStatus, normalizedStatus, createdAtExternal, importBatchId]
      properties:
        id: { type: integer, format: int64 }
        externalOrderId: { type: integer, format: int64 }
        externalId: { type: string }
        externalInnerId: { type: string }
        workerName: { type: string }
        traderId: { type: integer, format: int64 }
        traderLogin: { type: string }
        requisiteRaw: { type: string }
        requisitePhone: { type: string }
        methodType: { type: string }
        methodName: { type: string }
        amountMinor: { type: integer, format: int64 }
        currency: { type: string }
        rawStatus: { type: string }
        normalizedStatus: { type: string, enum: [success, corrected, failed, cancelled, unknown] }
        createdAtExternal: { type: string, format: date-time }
        importBatchId: { type: integer, format: int64 }
    OrdersListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        page: { type: integer, format: int64 }
        pageSize: { type: integer, format: int64 }
        total: { type: integer, format: int64 }
    OrderDashboardSummary:
      type: object
      required: [totalAmountMinor, totalCount, successAmountMinor, successCount, failedAmountMinor, failedCount, unknownAmountMinor, unknownCount]
      properties:
        totalAmountMinor: { type: integer, format: int64 }
        totalCount: { type: integer, format: int64 }
        successAmountMinor: { type: integer, format: int64 }
        successCount: { type: integer, format: int64 }
        failedAmountMinor: { type: integer, format: int64 }
        failedCount: { type: integer, format: int64 }
        unknownAmountMinor: { type: integer, format: int64 }
        unknownCount: { type: integer, format: int64 }
    OrderStatusBreakdownItem:
      type: object
      required: [rawStatus, normalizedStatus, amountMinor, count]
      properties:
        rawStatus: { type: string }
        normalizedStatus: { type: string, enum: [success, corrected, failed, cancelled, unknown] }
        amountMinor: { type: integer, format: int64 }
        count: { type: integer, format: int64 }
    OrderImportHistoryItem:
      type: object
      required: [id, teamId, uploadedBy, scopeType, direction, fileName, rowsCount, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        uploadedBy: { type: integer, format: int64 }
        scopeType: { type: string }
        direction: { type: string, enum: [inbound, outbound] }
        shiftId: { type: integer, format: int64 }
        accountingPeriodId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        fileName: { type: string }
        rowsCount: { type: integer, format: int64 }
        status: { type: string }
        supersededByBatchId: { type: integer, format: int64 }
        errorMessage: { type: string }
        createdAt: { type: string, format: date-time }
        appliedAt: { type: string, format: date-time }
    OrderDashboard:
      type: object
      required: [summary, statusBreakdown, unknownStatuses, recentImports]
      properties:
        summary: { $ref: "#/components/schemas/OrderDashboardSummary" }
        statusBreakdown:
          type: array
          items: { $ref: "#/components/schemas/OrderStatusBreakdownItem" }
        unknownStatuses:
          type: array
          items: { type: string }
        recentImports:
          type: array
          items: { $ref: "#/components/schemas/OrderImportHistoryItem" }
    DashboardResponse:
      type: object
      required: [dashboard]
      properties:
        dashboard: { $ref: "#/components/schemas/OrderDashboard" }
    ReconciliationRun:
      type: object
      required: [id, teamId, type, scopeType, expectedAmountMinor, actualAmountMinor, diffAmountMinor, status, createdAt]
      properties:
        id: { type: integer, format: int64 }
        teamId: { type: integer, format: int64 }
        type: { type: string }
        scopeType: { type: string, enum: [trader_shift, teamlead_period] }
        shiftId: { type: integer, format: int64 }
        accountingPeriodId: { type: integer, format: int64 }
        traderId: { type: integer, format: int64 }
        importBatchId: { type: integer, format: int64 }
        expectedAmountMinor: { type: integer, format: int64 }
        actualAmountMinor: { type: integer, format: int64 }
        diffAmountMinor: { type: integer, format: int64 }
        successAmountMinor: { type: integer, format: int64 }
        successCount: { type: integer, format: int64 }
        failedAmountMinor: { type: integer, format: int64 }
        failedCount: { type: integer, format: int64 }
        totalAmountMinor: { type: integer, format: int64 }
        totalCount: { type: integer, format: int64 }
        status: { type: string, enum: [matched, mismatch, accepted_with_comment] }
        comment: { type: string }
        confirmedBy: { type: integer, format: int64 }
        confirmedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    ReconciliationResponse:
      type: object
      required: [run]
      properties:
        run: { $ref: "#/components/schemas/ReconciliationRun" }
    ReconciliationItem:
      type: object
      required: [id, reconciliationRunId, issueType, createdAt]
      properties:
        id: { type: integer, format: int64 }
        reconciliationRunId: { type: integer, format: int64 }
        issueType: { type: string }
        externalOrderId: { type: integer, format: int64 }
        externalInnerId: { type: string }
        teamleadValue:
          type: object
          additionalProperties: true
        traderValue:
          type: object
          additionalProperties: true
        message: { type: string }
        createdAt: { type: string, format: date-time }
    ReconciliationItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ReconciliationItem" }
    ImportResult:
      type: object
      required: [importBatchId, status, rowsCount, createdOrders, updatedOrders, deactivatedScopeItems, activeScopeItems, supersededBatches]
      properties:
        importBatchId: { type: integer, format: int64 }
        status: { type: string }
        rowsCount: { type: integer, format: int64 }
        createdOrders: { type: integer, format: int64 }
        updatedOrders: { type: integer, format: int64 }
        deactivatedScopeItems: { type: integer, format: int64 }
        activeScopeItems: { type: integer, format: int64 }
        supersededBatches: { type: integer, format: int64 }
        rawStatusCounts:
          type: object
          additionalProperties: { type: integer }
        normalizedStatusCounts:
          type: object
          additionalProperties: { type: integer }
        unknownStatuses:
          type: array
          items: { type: string }
    ImportResponse:
      type: object
      required: [result]
      properties:
        result: { $ref: "#/components/schemas/ImportResult" }
    AccountingPeriod:
      type: object
      required: [id, title, dateRange, inboundStatus, outboundStatus, status]
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        dateRange: { type: string }
        inboundStatus: { type: string, enum: [matched, mismatch, accepted_with_comment] }
        outboundStatus: { type: string, enum: [matched, mismatch, accepted_with_comment] }
        status: { type: string, enum: [open, closed, closed_with_discrepancy] }
    AccountingPeriodsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AccountingPeriod" }
    AuditLogEntry:
      type: object
      required: [id, createdAt, actorLogin, action, entityType, entityId, maskedPayload]
      properties:
        id: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        actorLogin: { type: string }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        comment: { type: string }
        maskedPayload:
          type: object
          additionalProperties: true
    AuditLogResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, not_ready] }
  responses:
    Error:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login result and Set-Cookie session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        default: { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      responses:
        "200":
          description: Session revoked and cookie cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        default: { $ref: "#/components/responses/Error" }
  /auth/me:
    get:
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/traders:
    get:
      responses:
        "200":
          description: Traders
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TradersListResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password, salaryRateBps, externalWorkerName]
              properties:
                login: { type: string }
                password: { type: string, format: password }
                salaryRateBps: { type: integer, format: int64 }
                externalWorkerName: { type: string }
      responses:
        "201":
          description: Trader created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TraderResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/traders/{traderId}:
    parameters:
      - name: traderId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      responses:
        "200":
          description: Trader
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TraderResponse" }
        default: { $ref: "#/components/responses/Error" }
    patch:
      responses:
        "200":
          description: Trader updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TraderResponse" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      responses:
        "200":
          description: Trader disabled/deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/traders/{traderId}/reset-password:
    post:
      parameters:
        - name: traderId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Temporary password returned once
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetTraderPasswordResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/requisites:
    get:
      responses:
        "200":
          description: Requisites
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequisitesListResponse" }
        default: { $ref: "#/components/responses/Error" }
    post:
      responses:
        "201":
          description: Requisite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequisiteResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/requisites/{requisiteId}:
    parameters:
      - name: requisiteId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      responses:
        "200":
          description: Requisite
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequisiteResponse" }
        default: { $ref: "#/components/responses/Error" }
    patch:
      responses:
        "200":
          description: Requisite updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequisiteResponse" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      responses:
        "200":
          description: Requisite archived
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/requisites/{requisiteId}/assign:
    post:
      parameters:
        - name: requisiteId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssignmentResponse" }
        default: { $ref: "#/components/responses/Error" }
  /teamlead/requisites/{requisiteId}/unassign:
    post:
      parameters:
        - name: requisiteId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Assignment closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
